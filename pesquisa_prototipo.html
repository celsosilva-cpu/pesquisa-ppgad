<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pesquisa — Práticas de Gestão em IFES</title>
<style>
  :root{
    --stone-50:#fafaf9; --stone-100:#f5f5f4; --stone-200:#e7e5e4; --stone-300:#d6d3d1;
    --stone-400:#a8a29e; --stone-500:#78716c; --stone-600:#57534e; --stone-700:#44403c;
    --stone-800:#292524; --stone-900:#1c1917;
    --teal-50:#eef2fb; --teal-100:#dbe4f5; --teal-500:#2a4d8c; --teal-600:#1d3c73;
    --teal-700:#18315e; --teal-800:#13284d; --teal-900:#102a4f;
    --gold:#b0883a; --gold-2:#c9a84a; --gold-tint:#f6f0df;
    --white:#fff;
    --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--stone-900); background:#f4f0e8;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:clamp(1rem,3vw,2.5rem); overflow-y:auto; -webkit-font-smoothing:antialiased;
  }
  @media (max-width:640px){ body{ align-items:flex-start; } }
  .wrap{ width:100%; max-width:42rem; }

  .card{
    background:var(--white); border:1px solid var(--stone-200); border-radius:1rem;
    box-shadow:0 1px 2px rgba(0,0,0,.05); padding:clamp(1.25rem,3vw,1.75rem);
  }
  .card.pad-lg{ padding:clamp(2rem,5vw,3rem); }
  .center{ text-align:center; }

  .eyebrow{ font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.14em; color:var(--teal-700); margin:0; }
  h1.title{ margin:.75rem 0 0; font-size:clamp(1.5rem,4vw,1.9rem); font-weight:600; letter-spacing:-.02em; line-height:1.15; }
  .lead{ margin:1rem 0 0; color:var(--stone-600); line-height:1.65; }

  .meta{ display:flex; flex-wrap:wrap; gap:.5rem 1.5rem; margin-top:1.5rem; font-size:.875rem; color:var(--stone-500); }
  .meta span{ display:inline-flex; align-items:center; gap:.5rem; }
  .dot{ width:.4rem; height:.4rem; border-radius:9999px; background:var(--teal-600); }

  /* botões */
  .btn-primary{
    width:100%; border:0; border-radius:.85rem; padding:.9rem 1.25rem; font-size:.9rem; font-weight:600;
    font-family:var(--font); background:var(--teal-700); color:#fff; cursor:pointer; transition:background .15s;
  }
  .btn-primary:hover{ background:var(--teal-800); }
  .btn-primary[disabled]{ background:var(--stone-200); color:var(--stone-400); cursor:not-allowed; }
  .btn-inline{ width:auto; display:inline-flex; align-items:center; gap:.4rem; padding:.8rem 1.5rem; }
  .btn-ghost{
    border:0; background:none; font-family:var(--font); cursor:pointer; color:var(--stone-500);
    font-size:.875rem; font-weight:500; padding:.6rem .8rem; border-radius:.5rem; display:inline-flex; align-items:center; gap:.25rem; transition:color .15s;
  }
  .btn-ghost:hover{ color:var(--stone-800); }
  .btn-dark{ background:var(--stone-900); color:#fff; border:0; border-radius:.6rem; padding:.65rem 1rem; font-size:.875rem; font-weight:600; font-family:var(--font); cursor:pointer; }
  .btn-dark:hover{ background:var(--stone-800); }

  button:focus-visible, .consent:focus-visible, input:focus-visible{ outline:2px solid var(--teal-600); outline-offset:2px; }

  /* consentimento */
  .consent{
    width:100%; text-align:left; display:flex; gap:.75rem; align-items:flex-start; margin-top:1.75rem;
    border:1px solid var(--stone-200); background:#fff; border-radius:.85rem; padding:1rem; cursor:pointer; transition:.15s;
    font-family:var(--font);
  }
  .consent:hover{ border-color:var(--stone-300); }
  .consent.sel{ border-color:var(--teal-600); background:var(--teal-50); }
  .checkbox{ margin-top:.1rem; flex:0 0 auto; width:1.25rem; height:1.25rem; border:1px solid var(--stone-300); border-radius:.4rem; background:#fff; display:flex; align-items:center; justify-content:center; color:#fff; }
  .checkbox.sel{ border-color:var(--teal-600); background:var(--teal-600); }
  .consent-text{ font-size:.875rem; color:var(--stone-700); line-height:1.5; }

  /* cabeçalho da pergunta */
  .header-row{ display:flex; align-items:center; justify-content:space-between; padding:0 .25rem; margin-bottom:1rem; }
  .stepper{ display:flex; align-items:center; gap:.4rem; }
  .seg{ height:.5rem; border-radius:9999px; transition:all .3s; }
  .seg.now{ width:1.5rem; background:var(--teal-600); }
  .seg.done{ width:.5rem; background:var(--teal-600); }
  .seg.todo{ width:.5rem; background:var(--stone-300); }
  .save-chip{ display:inline-flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--stone-400); }
  .save-chip .ico{ color:var(--teal-600); display:inline-flex; }
  .dot-pulse{ width:.55rem; height:.55rem; border-radius:9999px; background:var(--teal-500); display:inline-block; animation:pulse 1s ease-in-out infinite; }

  .sec-row{ display:flex; align-items:baseline; justify-content:space-between; padding:0 .25rem; }
  .sec-name{ font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.14em; color:var(--teal-700); margin:0; }
  .sec-count{ font-size:.75rem; color:var(--stone-400); }
  .progress{ margin:.5rem .25rem .9rem; }
  .progress-track{ height:.375rem; width:100%; background:var(--stone-200); border-radius:9999px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--teal-600); border-radius:9999px; transition:width .5s; }

  .def-btn{ display:inline-flex; align-items:center; justify-content:center; width:1.05rem; height:1.05rem; margin-left:.4rem; padding:0; border:0; background:none; color:var(--gold); cursor:pointer; vertical-align:middle; position:relative; top:-1px; }
  .def-btn:hover{ color:var(--teal-700); }
  .def-panel{ margin:0 .15rem 1rem; padding:.8rem 1rem; background:var(--teal-50); border-left:3px solid var(--gold); border-radius:.4rem; font-size:.85rem; color:var(--stone-700); line-height:1.5; animation:cardIn .25s ease; }
  .def-panel b{ color:var(--teal-800); font-weight:700; }
  .q-title{ font-size:clamp(1.125rem,3vw,1.5rem); font-weight:500; letter-spacing:-.01em; line-height:1.35; color:var(--stone-900); margin:0; }
  .q-body{ margin-top:1.25rem; }

  /* ESCALA — mobile (pilha) */
  .scale-mobile{ display:flex; flex-direction:column; gap:.5rem; }
  .opt{ display:flex; align-items:center; gap:.75rem; text-align:left; border:1px solid var(--stone-200); background:#fff; border-radius:.85rem; padding:.75rem 1rem; cursor:pointer; font-family:var(--font); transition:.15s; }
  .opt:hover{ border-color:var(--stone-300); }
  .opt.sel{ border-color:var(--teal-600); background:var(--teal-50); }
  .num-chip{ flex:0 0 auto; width:1.75rem; height:1.75rem; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:.875rem; font-weight:600; font-variant-numeric:tabular-nums; background:var(--stone-100); color:var(--stone-500); }
  .num-chip.sel{ background:var(--teal-600); color:#fff; }
  .opt-label{ font-size:.9rem; color:var(--stone-700); }
  .opt.sel .opt-label{ font-weight:600; color:var(--teal-900); }

  /* ESCALA — desktop (faixa de 7) */
  .scale-desktop{ display:none; grid-template-columns:repeat(7,1fr); gap:.5rem; }
  .cell{ display:flex; flex-direction:column; align-items:center; border:1px solid var(--stone-200); background:#fff; border-radius:.85rem; padding:.6rem .25rem; cursor:pointer; font-family:var(--font); transition:.15s; }
  .cell:hover{ border-color:var(--stone-300); background:var(--stone-50); }
  .cell.sel{ border-color:var(--teal-600); background:var(--teal-50); box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .cell-num{ width:2.25rem; height:2.25rem; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:600; font-variant-numeric:tabular-nums; background:var(--stone-100); color:var(--stone-500); transition:.15s; }
  .cell-num.sel{ background:var(--teal-600); color:#fff; }
  .cell-label{ margin-top:.4rem; height:2rem; display:flex; align-items:center; text-align:center; font-size:.75rem; line-height:1.15; color:var(--stone-500); }
  .cell.sel .cell-label{ font-weight:600; color:var(--teal-900); }
  .extremes{ display:none; justify-content:space-between; padding:0 .25rem; margin-top:.75rem; font-size:.75rem; color:var(--stone-400); }
  @media (min-width:640px){
    .scale-mobile{ display:none; }
    .scale-desktop{ display:grid; }
    .extremes{ display:flex; }
  }

  /* múltipla escolha */
  .choice{ display:flex; flex-direction:column; gap:.5rem; }
  .choice-opt{ display:flex; align-items:center; gap:.75rem; text-align:left; border:1px solid var(--stone-200); background:#fff; border-radius:.85rem; padding:.75rem 1rem; cursor:pointer; font-family:var(--font); font-size:.9rem; color:var(--stone-700); transition:.15s; }
  .choice-opt:hover{ border-color:var(--stone-300); }
  .choice-opt.sel{ border-color:var(--teal-600); background:var(--teal-50); font-weight:600; color:var(--teal-900); }
  .radio{ flex:0 0 auto; width:1.25rem; height:1.25rem; border-radius:9999px; border:1px solid var(--stone-300); display:flex; align-items:center; justify-content:center; color:#fff; }
  .radio.sel{ border-color:var(--teal-600); background:var(--teal-600); }

  .text-input{ width:100%; border:1px solid var(--stone-300); border-radius:.85rem; padding:.75rem 1rem; font-size:1rem; font-family:var(--font); outline:none; transition:.15s; }
  .text-input:focus{ border-color:var(--teal-600); box-shadow:0 0 0 3px var(--teal-100); }
  .text-input.sm{ padding:.65rem 1rem; font-size:.875rem; margin-top:.25rem; }
  .select-wrap{ position:relative; }
  .select-input{ width:100%; border:1px solid var(--stone-300); border-radius:.85rem; padding:.75rem 2.75rem .75rem 1rem; font-size:1rem; font-family:var(--font); color:var(--stone-900); background:#fff; outline:none; appearance:none; -webkit-appearance:none; cursor:pointer; transition:.15s; }
  .select-input.placeholder{ color:var(--stone-400); }
  .select-input:focus{ border-color:var(--teal-600); box-shadow:0 0 0 3px var(--teal-100); }
  .select-chev{ position:absolute; right:1rem; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--stone-400); display:flex; }

  /* friso marajoara (greca em ziguezague) e ornamentos */
  .frieze{ height:12px; background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='24'%20height='12'%3E%3Cpath%20d='M0,9L6,3L12,9L18,3L24,9'%20fill='none'%20stroke='%23b0883a'%20stroke-width='1.6'/%3E%3C/svg%3E"); background-repeat:repeat-x; background-position:center; }
  .intro-frieze{ height:14px; margin:1rem 0 1.25rem; }
  .eyebrow.gold{ color:var(--gold); }
  .sec-glyph{ color:var(--gold); display:inline-flex; vertical-align:middle; margin-right:.45rem; position:relative; top:-1px; }
  .cer-motif{ color:var(--gold); display:flex; justify-content:center; margin-bottom:.5rem; }
  .logo{ display:block; margin:0 auto; width:72%; max-width:300px; height:auto; border-radius:.6rem; }
  .logo.sm{ width:46%; max-width:170px; margin:1.5rem auto 0; opacity:.92; }

  .nav-row{ display:flex; align-items:center; justify-content:space-between; margin-top:1rem; }
  .hint{ font-size:.8rem; color:var(--stone-400); }
  .nav-center{ display:flex; align-items:center; justify-content:center; gap:.75rem; margin-top:1.75rem; flex-wrap:wrap; }
  .trans-diamond{ color:var(--gold); display:flex; justify-content:center; margin:1.25rem 0 .75rem; }
  .trans-eyebrow{ font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--stone-500); margin:0; }
  .trans-title{ font-size:clamp(1.25rem,3.5vw,1.55rem); font-weight:700; letter-spacing:-.015em; line-height:1.2; color:var(--teal-800); margin:.6rem 0 0; }
  .trans-sub{ font-size:.9rem; color:var(--stone-500); margin:.5rem 0 0; line-height:1.5; }
  .trans-def{ margin:1.25rem auto 0; max-width:92%; padding:.8rem 1rem; background:var(--teal-50); border-left:3px solid var(--gold); border-radius:.4rem; font-size:.85rem; color:var(--stone-700); line-height:1.5; text-align:left; }
  .trans-def b{ color:var(--teal-800); font-weight:700; }
  .btn-cont{ border:0; border-radius:.6rem; padding:.85rem 1.5rem; font-size:.95rem; font-weight:600; font-family:var(--font); background:var(--teal-800); color:#fff; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:.5rem; }
  .btn-cont:hover{ background:var(--teal-900); }
  .btn-back-sec{ border:0; background:none; font-family:var(--font); cursor:pointer; color:var(--stone-500); font-size:.88rem; font-weight:500; display:inline-flex; align-items:center; gap:.3rem; transition:color .15s; margin-top:.5rem; }
  .btn-back-sec:hover{ color:var(--stone-800); }

  .tick{ margin:0 auto; display:flex; align-items:center; justify-content:center; border-radius:9999px; }
  .tick.sm{ width:3.5rem; height:3.5rem; background:var(--teal-50); color:var(--teal-700); }
  .tick.lg{ width:4rem; height:4rem; background:var(--teal-600); color:#fff; }

  .done-box{ margin-top:1.5rem; border:1px solid var(--stone-200); border-radius:.85rem; padding:1.25rem; text-align:left; }
  .done-box .dh{ display:flex; align-items:center; gap:.5rem; font-size:.875rem; font-weight:500; color:var(--stone-700); }
  .done-box .dh .ico{ color:var(--teal-700); display:inline-flex; }
  .done-box .dn{ margin:.25rem 0 0; font-size:.75rem; color:var(--stone-500); }

  /* Tela de conclusão redesenhada */
  .done-card{ padding:0; overflow:hidden; }
  .done-body{ padding:clamp(1rem,3vw,1.75rem) clamp(1.25rem,4vw,2.5rem) clamp(1.25rem,4vw,2rem); text-align:center; }
  .done-diamond-wrap{ display:flex; align-items:center; justify-content:center; gap:.75rem; margin:.75rem 0 .5rem; }
  .done-diamond-line{ flex:1; max-width:60px; height:1px; background:var(--gold); }
  .done-diamond{ color:var(--gold); display:flex; }
  .done-eyebrow{ font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--stone-500); margin:0; }
  .done-title{ font-size:clamp(1.4rem,4vw,1.75rem); font-weight:700; letter-spacing:-.02em; line-height:1.15; color:var(--teal-800); margin:.35rem 0 0; }
  .done-sub{ margin:.6rem 0 0; color:var(--stone-600); line-height:1.55; font-size:.92rem; }
  .done-sub b{ color:var(--stone-900); font-weight:600; }

  .protect-box{ margin:1.5rem 0; border:1px solid var(--stone-200); border-radius:.85rem; padding:1.25rem; text-align:left; display:flex; gap:1.25rem; flex-wrap:wrap; }
  .protect-left{ flex:1 1 260px; display:flex; gap:.75rem; align-items:flex-start; }
  .protect-left .ico-wrap{ flex:0 0 auto; width:2.5rem; height:2.5rem; border-radius:9999px; background:var(--teal-50); display:flex; align-items:center; justify-content:center; color:var(--teal-700); }
  .protect-left .pl-text b{ display:block; font-size:.9rem; font-weight:700; color:var(--stone-800); margin-bottom:.25rem; }
  .protect-left .pl-text{ font-size:.82rem; color:var(--stone-600); line-height:1.45; }
  .protect-right{ flex:1 1 200px; display:flex; flex-direction:column; gap:.5rem; justify-content:center; }
  .protect-check{ display:flex; gap:.5rem; align-items:flex-start; font-size:.82rem; color:var(--stone-600); line-height:1.4; }
  .protect-check .ico{ flex:0 0 auto; color:var(--teal-600); display:flex; margin-top:.1rem; }

  .email-box{ margin:0 0 .5rem; border:1px solid var(--stone-200); border-radius:.85rem; padding:1rem 1.1rem; text-align:left; }
  .email-header{ display:flex; gap:.65rem; align-items:flex-start; margin-bottom:.5rem; }
  .email-header .ico-wrap{ flex:0 0 auto; width:2.25rem; height:2.25rem; border-radius:9999px; background:var(--teal-50); display:flex; align-items:center; justify-content:center; color:var(--teal-700); }
  .email-header b{ font-size:.9rem; color:var(--stone-800); }
  .email-header .opt-tag{ color:var(--gold); font-weight:600; font-size:.85rem; }
  .email-desc{ font-size:.82rem; color:var(--stone-600); line-height:1.45; margin:0 0 .75rem; }
  .email-row{ display:flex; flex-direction:column; gap:.5rem; }
  @media (min-width:640px){ .email-row{ flex-direction:row; } .email-row .text-input{ flex:1; } }
  .btn-email{ border:0; border-radius:.6rem; padding:.7rem 1.25rem; font-size:.88rem; font-weight:600; font-family:var(--font); background:var(--teal-800); color:#fff; cursor:pointer; transition:.15s; white-space:nowrap; }
  .btn-email:hover{ background:var(--teal-900); }
  .btn-email[disabled]{ opacity:.5; cursor:not-allowed; }

  .done-divider{ display:flex; align-items:center; gap:.75rem; margin:.9rem 0; }
  .done-divider-line{ flex:1; height:1px; background:var(--stone-200); }
  .done-divider-text{ font-size:.82rem; color:var(--stone-400); }

  .done-close{ display:flex; align-items:flex-start; gap:.5rem; margin:0 auto; cursor:pointer; border:0; background:none; font-family:var(--font); text-align:left; }
  .done-close .ico{ color:var(--stone-600); display:flex; margin-top:.15rem; }
  .done-close b{ display:block; font-size:.9rem; color:var(--stone-800); font-weight:600; }
  .done-close span{ font-size:.8rem; color:var(--stone-500); }

  .done-footer{ margin-top:1.1rem; text-align:center; }
  .done-footer-diamond{ color:var(--gold); display:flex; justify-content:center; margin-bottom:.5rem; }
  .done-footer-text{ font-size:.82rem; color:var(--stone-500); line-height:1.5; }
  .done-footer-text b{ color:var(--stone-700); font-weight:700; }
  .done-shortline{ width:60px; height:1px; background:var(--stone-300); margin:1rem auto; }
  .done-emblem{ display:block; width:clamp(130px,40%,180px); height:auto; margin:0 auto .7rem; opacity:.92; }
  .done-foot-line{ font-size:.8rem; color:var(--stone-500); letter-spacing:.02em; }
  .done-foot-inst{ font-size:.85rem; color:var(--teal-800); font-weight:700; letter-spacing:.02em; margin-top:.15rem; }

  .anim-card{ animation:cardIn .38s cubic-bezier(.22,.61,.36,1); }

  /* ---------- Tela de entrada (redesenhada) ---------- */
  .intro-card{ padding:0; overflow:hidden; }
  .intro-body{ padding:clamp(1rem,3vw,1.5rem) clamp(1.25rem,4vw,2.5rem) clamp(1.5rem,4vw,2rem); }

  /* Cabeçalho institucional (faixa azul com logo branca + mosaico) */
  .hero{
    position:relative; background:var(--teal-800); color:#fff; overflow:hidden;
    padding:clamp(1rem,3vw,1.4rem) clamp(1.25rem,4vw,2.25rem);
    display:flex; align-items:center; gap:clamp(.75rem,3vw,1.5rem);
    border-top-left-radius:1rem; border-top-right-radius:1rem;
  }

  @media (min-width:640px){ .hero::after{ width:50%; background-size:auto 240%; } }
  .hero-logo{ flex:0 0 auto; position:relative; z-index:1; }
  .hero-logo img{
    display:block; width:clamp(120px, 28vw, 165px); height:auto;
  }
  .hero-text{ position:relative; z-index:1; min-width:0; }
  .hero-title{
    margin:0; font-size:clamp(.8rem, 2.2vw, 1.15rem); font-weight:600;
    letter-spacing:.03em; text-transform:uppercase; line-height:1.25; color:#fff;
  }
  .hero-sub{
    margin:.4rem 0 0; font-size:clamp(.66rem, 1.7vw, .85rem); font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; color:var(--gold-2);
    white-space:nowrap;
  }
  @media (max-width:520px){ .hero-sub{ letter-spacing:.06em; } }

  .intro-frieze-new{ height:14px; margin:1.25rem 0 1.5rem; }
  .intro-eyebrow{ font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--gold); margin:0 0 .4rem; }
  .intro-title{ font-size:clamp(1.4rem,4.2vw,1.8rem); font-weight:700; letter-spacing:-.02em; line-height:1.15; color:var(--teal-800); margin:0 0 .75rem; }
  .intro-sub{ color:var(--stone-600); line-height:1.55; margin:0 0 1.1rem; font-size:.9rem; }
  .intro-sub b{ color:var(--stone-800); font-weight:600; }

  .mini-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:.6rem; margin-bottom:1.25rem; }
  @media (min-width:640px){ .mini-grid{ grid-template-columns:repeat(4,1fr); } }
  .mini{
    border:1px solid var(--stone-200); border-radius:.75rem; padding:.85rem .6rem; text-align:center;
    background:#fff; display:flex; flex-direction:column; align-items:center; gap:.2rem;
  }
  .mini-ico{ color:var(--teal-700); display:flex; margin-bottom:.15rem; }
  .mini-eyebrow{ font-size:.62rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--stone-500); margin:.1rem 0 .1rem; }
  .mini-strong{ font-size:.9rem; font-weight:700; color:var(--teal-800); line-height:1.2; }
  .mini-note{ font-size:.72rem; color:var(--stone-500); line-height:1.25; margin-top:.1rem; }

  .info-list{ margin:0 0 1.25rem; padding:0; list-style:none; }
  .info-row{ display:flex; gap:.85rem; padding:.85rem 0; border-top:1px solid var(--stone-200); }
  .info-row:last-child{ border-bottom:1px solid var(--stone-200); }
  .info-ico{ color:var(--gold); flex:0 0 auto; padding-top:.1rem; }
  .info-text{ font-size:.88rem; color:var(--stone-700); line-height:1.5; }
  .info-text b{ color:var(--stone-900); font-weight:600; }

  .consent-new{
    width:100%; text-align:left; display:flex; gap:.85rem; align-items:flex-start;
    border:1.5px solid var(--teal-700); background:#fff; border-radius:.75rem; padding:1rem 1.1rem;
    cursor:pointer; transition:.15s; font-family:var(--font); margin-bottom:1rem;
  }
  .consent-new.sel{ background:var(--teal-50); border-color:var(--teal-700); }
  .checkbox-new{
    margin-top:.05rem; flex:0 0 auto; width:1.4rem; height:1.4rem;
    border:1.5px solid var(--stone-300); border-radius:.35rem; background:#fff;
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .checkbox-new.sel{ border-color:var(--teal-700); background:var(--teal-700); }
  .consent-new-text{ font-size:.88rem; color:var(--stone-700); line-height:1.5; }

  .start-btn{
    width:100%; border:0; border-radius:.6rem; padding:1rem 1.25rem;
    font-size:1rem; font-weight:600; font-family:var(--font);
    background:var(--teal-800); color:#fff; cursor:pointer;
    transition:background .25s ease, opacity .25s ease, transform .15s ease;
    display:flex; align-items:center; justify-content:center; gap:.5rem;
  }
  .start-btn:hover{ background:var(--teal-900); }
  .start-btn:active{ transform:scale(.99); }
  .start-btn[disabled]{ background:var(--teal-800); opacity:.45; cursor:not-allowed; }
  .start-help{
    margin:.6rem 0 0; text-align:center; font-size:.78rem; color:var(--stone-500);
    letter-spacing:.01em;
    display:flex; align-items:center; justify-content:center; gap:.4rem;
  }
  .start-help .ico{ display:inline-flex; color:var(--gold); }

  .intro-foot{ margin:1.5rem 0 0; }
  .foot-ornament{
    height:14px; background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='80'%20height='14'%3E%3Cpath%20d='M0,7L25,7M55,7L80,7M30,9L40,3L50,9'%20fill='none'%20stroke='%23b0883a'%20stroke-width='1.4'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat; background-position:center;
  }
  .foot-text{ margin:.75rem 0 0; text-align:center; font-size:.78rem; color:var(--stone-500); line-height:1.5; }

  /* ---------- demais animações ---------- */
  .anim-tick{ animation:tickIn .45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(12px);} to{ opacity:1; transform:none; } }
  @keyframes tickIn{ from{ opacity:0; transform:scale(.6);} to{ opacity:1; transform:none; } }
  @keyframes pulse{ 50%{ opacity:.4; } }
  @media (prefers-reduced-motion:reduce){ .anim-card,.anim-tick,.dot-pulse{ animation:none; } .progress-fill,.seg,.btn-primary{ transition:none; } }
</style>

let _tempoInicio = null;
let _jaEnviado = false;

function ordemDaSecao(secId){
  // Reconstrói a ordem dos itens vista pelo respondente, usando a mesma lógica de visible().
  const sec = SECTIONS.find(s => s.id === secId);
  if(!sec) return [];
  const seed = (SESSION_SEED + (SECTION_SEED_OFFSET[secId]||0) * 7919) >>> 0;
  return shuffleWithSeed(sec.questions, seed).map(q => q.id);
}

function montarPayloadSubmissao(){
  // Normaliza os IDs dos itens para o padrão da planilha: GC1 -> GC01, GC10 -> GC10, GOV11, DEC21, etc.
  const respostas = {};
  Object.keys(state.answers).forEach(function(id){
    const v = state.answers[id];
    if(v === null || v === undefined || v === "") return;
    // Pad de 2 dígitos só nos GC (que vão de 1 a 10); GOV/DEC já têm 2 dígitos nos IDs originais.
    let key = id;
    if(/^GC\d+$/.test(id)){
      const n = id.replace("GC","").padStart(2,"0");
      key = "GC" + n;
    }
    respostas[key] = v;
  });
  return {
    tipo: "submissao",
    submission_id: SUBMISSION_ID,
    completo: true,
    duracao_segundos: _tempoInicio ? Math.round((Date.now() - _tempoInicio)/1000) : null,
    semente: SESSION_SEED,
    ordem_gc:  ordemDaSecao("gc"),
    ordem_gov: ordemDaSecao("gov"),
    ordem_dec: ordemDaSecao("dec"),
    user_agent: (navigator.userAgent || "").slice(0,200),
    respostas: respostas
  };
}

function enviarParaServidor(payload){
  if(!ENDPOINT_URL){
    console.log("[modo offline] payload que seria enviado:", payload);
    return Promise.resolve({ ok:true, offline:true });
  }
  return fetch(ENDPOINT_URL, {
    method: "POST",
    // text/plain evita preflight CORS no Apps Script (que aceita o body como string).
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  }).then(r => r.json()).catch(err => ({ ok:false, erro:String(err) }));
}

function enviarSubmissaoFinal(){
  if(_jaEnviado) return;
  _jaEnviado = true;
  enviarParaServidor(montarPayloadSubmissao()).then(function(res){
    console.log("[envio]", res);
  });
}

function enviarEmail(email){
  return enviarParaServidor({ tipo:"email", email:email, submission_id_relacionado:null });
}

// ---- Randomização determinística ----
// Mulberry32: PRNG simples, rápido e suficiente para randomizar ordem de itens em pesquisa.
// Mesma semente => mesma ordem. Permite reconstruir a ordem que cada respondente viu, no momento da análise.
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffleWithSeed(arr, seed){
  const out = arr.slice();
  const rnd = mulberry32(seed);
  for(let i=out.length-1; i>0; i--){
    const j = Math.floor(rnd() * (i+1));
    const tmp = out[i]; out[i] = out[j]; out[j] = tmp;
  }
  return out;
}
// Semente da sessão: 8 dígitos, gerada uma vez por respondente.
const SESSION_SEED = Math.floor(10000000 + Math.random() * 90000000);
// Seções a randomizar: apenas as escalas com construtos psicométricos (gc, gov, dec). Perfil (D1..D9) mantém ordem fixa.
const RANDOMIZE_SECTIONS = { gc:true, gov:true, dec:true };

// Filtra itens visíveis e, nas seções marcadas, embaralha com a semente.
// A semente de cada seção é derivada da semente da sessão (somando offsets fixos) para que GC, GOV e DEC
// sejam embaralhadas de forma independente — sem que a ordem de uma "vaze" para a outra.
const SECTION_SEED_OFFSET = { gc:0, gov:1, dec:2 };
const visible = (section, a) => {
  const filtered = section.questions.filter(q => !q.showIf || q.showIf(a));
  if(RANDOMIZE_SECTIONS[section.id]){
    const seed = (SESSION_SEED + (SECTION_SEED_OFFSET[section.id]||0) * 7919) >>> 0;
    return shuffleWithSeed(filtered, seed);
  }
  return filtered;
};
const NEXT_LEAD = [
  "A seguir: suas práticas de governança na unidade",
  "A seguir: como você decide no dia a dia",
  "Quase no fim: algumas informações sobre você"
];

/* ---------- estado ---------- */
const state = { phase:"intro", si:0, qi:0, answers:{}, consent:false, saving:false, reviewing:{}, defOpen:{} };
let saveTimer = null;

/* ---------- utilidades ---------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function isAnswered(q, a){
  if(!q) return false;
  const v = a[q.id];
  if(q.kind==="text") return typeof v==="string" && v.trim().length>0;
  if(q.kind==="scale") return v!=null;
  if(q.kind==="select") return v!=null && v!=="";
  if(q.kind==="choice"){
    if(v==null) return false;
    if(q.other && v==="__outro__") return (a[q.id+"_outro"]||"").trim().length>0;
    return true;
  }
  return false;
}
function chipInner(saving){
  return saving
    ? '<span class="dot-pulse"></span> Salvando…'
    : '<span class="ico">'+ICON.check(13,2.5)+'</span> Respostas salvas';
}
function sectionProgress(sec, a){
  const vis = visible(sec, a); const total = vis.length||1;
  const done = vis.filter(q => { const v=a[q.id]; return q.kind==="text" ? (typeof v==="string"&&v.trim()) : v!=null; }).length;
  return 6 + (done/total)*94;
}

/* ---------- ações ---------- */
function flashSaveRender(){ state.saving=true; render(); clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ state.saving=false; render(); },650); }
function flashSaveDirect(){
  state.saving=true; const c=document.getElementById("saveChip"); if(c) c.innerHTML=chipInner(true);
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ state.saving=false; const cc=document.getElementById("saveChip"); if(cc) cc.innerHTML=chipInner(false); },650);
}
function setAnswerFull(id, val){ state.answers[id]=val; flashSaveRender(); }
let advTimer = null;
function selectAndAdvance(id, value, advance){
  state.answers[id] = value;
  if(advance){
    state.saving = true; render();                 // mostra a opção acesa
    clearTimeout(advTimer);
    advTimer = setTimeout(()=>{ state.saving=false; goNext(); }, 320);
  } else {
    flashSaveRender();                             // "Outro": revela o campo, não avança
  }
}
function curState(){
  const sec = SECTIONS[state.si];
  const vis = visible(sec, state.answers);
  const qi = Math.min(state.qi, Math.max(0, vis.length-1));
  return { sec, vis, qi, q: vis[qi], last: state.si===SECTIONS.length-1 };
}
function goNext(){
  const {q, vis, qi, last} = curState();
  if(q) delete state.reviewing[q.id];
  if(qi < vis.length-1) state.qi = qi+1;
  else if(!last) state.phase = "transition";
  else state.phase = "done";
  render();
}
function goBack(){
  if(state.phase==="transition" || state.phase==="done"){ state.phase="q"; render(); return; }
  const {qi} = curState();
  if(qi>0) state.qi = qi-1;
  else if(state.si>0){ const pv=visible(SECTIONS[state.si-1], state.answers); state.si-=1; state.qi=Math.max(0,pv.length-1); }
  else { state.phase="intro"; render(); return; }
  // marca a pergunta de destino como "em revisão": ali o botão Avançar volta a aparecer
  const dest = curState().q; if(dest) state.reviewing[dest.id] = true;
  render();
}
function continueNext(){ state.si+=1; state.qi=0; state.phase="q"; render(); }

/* ---------- builders ---------- */
function stepperHTML(cur){
  return '<div class="stepper">'+SECTIONS.map((s,i)=>{
    const cls = i<cur?"done":(i===cur?"now":"todo"); return '<span class="seg '+cls+'"></span>';
  }).join("")+'</div>';
}
function scaleHTML(val){
  const mob = SCALE.map(o=>{ const sel=val===o.v;
    return '<button class="opt'+(sel?' sel':'')+'" data-val="'+o.v+'"><span class="num-chip'+(sel?' sel':'')+'">'+o.v+'</span><span class="opt-label">'+o.label+'</span></button>';
  }).join("");
  const desk = SCALE.map(o=>{ const sel=val===o.v;
    return '<button class="cell'+(sel?' sel':'')+'" data-val="'+o.v+'"><span class="cell-num'+(sel?' sel':'')+'">'+o.v+'</span><span class="cell-label">'+o.label+'</span></button>';
  }).join("");
  return '<div class="scale-mobile">'+mob+'</div><div class="scale-desktop">'+desk+'</div>'
    +'<div class="extremes"><span>1 = Nunca</span><span>7 = Sempre</span></div>';
}
function choiceHTML(q, val, otherText){
  let html = '<div class="choice">';
  q.options.forEach(opt=>{ const sel=val===opt;
    html += '<button class="choice-opt'+(sel?' sel':'')+'" data-opt="'+esc(opt)+'"><span class="radio'+(sel?' sel':'')+'">'+(sel?ICON.check(12,3):'')+'</span>'+esc(opt)+'</button>';
  });
  if(q.other){ const sel=val==="__outro__";
    html += '<button class="choice-opt'+(sel?' sel':'')+'" data-opt="__outro__"><span class="radio'+(sel?' sel':'')+'">'+(sel?ICON.check(12,3):'')+'</span>Outro</button>';
    if(sel) html += '<input class="text-input sm" id="otherInput" placeholder="Especifique" value="'+esc(otherText||"")+'">';
  }
  return html+'</div>';
}
function selectHTML(q, val){
  const v = val||"";
  let html = '<div class="select-wrap"><select class="select-input'+(v?'':' placeholder')+'" id="selectInput">';
  html += '<option value=""'+(v?'':' selected')+' disabled hidden>Selecione…</option>';
  q.options.forEach(opt=>{ html += '<option value="'+esc(opt)+'"'+(v===opt?' selected':'')+'>'+esc(opt)+'</option>'; });
  html += '</select><span class="select-chev">'+ICON.down(18)+'</span></div>';
  return html;
}
function questionFieldHTML(q, a){
  if(q.kind==="select") return selectHTML(q, a[q.id]);
  if(q.kind==="scale") return scaleHTML(a[q.id]);
  if(q.kind==="choice") return choiceHTML(q, a[q.id], a[q.id+"_outro"]);
  if(q.kind==="text") return '<input class="text-input" id="textInput" inputmode="'+(q.numeric?"numeric":"text")+'" placeholder="'+esc(q.placeholder||"")+'" value="'+esc(a[q.id]||"")+'">';
  return "";
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById("app");

  if(state.phase==="intro"){
    app.innerHTML = ''
    + '<div class="card intro-card anim-card">'
    +   '<header class="hero">'
    +     '<div class="hero-logo"><img src="'+LOGO+'" alt="PPGAD"></div>'
    +     '<div class="hero-text"><h2 class="hero-title">Programa de Pós-Graduação em Administração</h2><p class="hero-sub">Universidade Federal do Pará</p></div>'
    +   '</header>'
    +   '<div class="intro-body">'
    +   '<p class="intro-eyebrow">Questionário de pesquisa</p>'
    +   '<h1 class="intro-title">Gestão do Conhecimento, Governança Pública e Otimização da Tomada de Decisão em Universidades Públicas</h1>'
    +   '<p class="intro-sub">Pesquisa de mestrado de <b>Celso Cardoso Silva</b>, do PPGAD/UFPA, sobre práticas de gestão e fatores organizacionais em IFES.</p>'

    +   '<div class="mini-grid">'
    +     '<div class="mini"><span class="mini-ico">'+ICON.users(20)+'</span><span class="mini-eyebrow">Quem responde</span><span class="mini-strong">Gestores de IFES</span><span class="mini-note">direção, chefia ou coordenação</span></div>'
    +     '<div class="mini"><span class="mini-ico">'+ICON.clock(20)+'</span><span class="mini-eyebrow">Tempo estimado</span><span class="mini-strong">7 a 10 minutos</span><span class="mini-note">para concluir</span></div>'
    +     '<div class="mini"><span class="mini-ico">'+ICON.layers(20)+'</span><span class="mini-eyebrow">Estrutura</span><span class="mini-strong">4 seções curtas</span><span class="mini-note">em escala de frequência</span></div>'
    +     '<div class="mini"><span class="mini-ico">'+ICON.lock(20)+'</span><span class="mini-eyebrow">Garantia</span><span class="mini-strong">Confidencialidade</span><span class="mini-note">análise apenas agregada</span></div>'
    +   '</div>'

    +   '<ul class="info-list">'
    +     '<li class="info-row"><span class="info-ico">'+ICON.user(22)+'</span><span class="info-text"><b>Quem pode responder:</b> servidores que exercem ou exerceram função de gestão (direção, chefia ou coordenação) em instituição federal de ensino superior.</span></li>'
    +     '<li class="info-row"><span class="info-ico">'+ICON.clipboard(22)+'</span><span class="info-text"><b>Como responder:</b> indique com que frequência cada afirmação descreve o que você efetivamente faz em sua atuação gerencial nos últimos 12 meses.</span></li>'
    +     '<li class="info-row"><span class="info-ico">'+ICON.shieldOk(22)+'</span><span class="info-text"><b>Sua participação:</b> é voluntária. As respostas são confidenciais, usadas apenas de forma agregada e você pode interromper o preenchimento a qualquer momento.</span></li>'
    +   '</ul>'

    +   '<button class="consent-new'+(state.consent?' sel':'')+'" id="consentBtn"><span class="checkbox-new'+(state.consent?' sel':'')+'">'+(state.consent?ICON.check(15,3):'')+'</span><span class="consent-new-text">Li as informações apresentadas, compreendi os termos da pesquisa e concordo em participar de forma livre e voluntária.</span></button>'

    +   '<button class="start-btn" id="startBtn" '+(state.consent?'':'disabled')+'>Começar '+ICON.arrowR(18)+'</button>'
    +   (state.consent ? '' : '<p class="start-help"><span class="ico">'+ICON.lock(14)+'</span> O botão será habilitado após o consentimento.</p>')

    +   '<div class="intro-foot"><div class="foot-ornament"></div><p class="foot-text">Dúvidas sobre a pesquisa? Entre em contato pelo e-mail do pesquisador informado no TCLE.</p></div>'
    +   '</div>'
    + '</div>';
    document.getElementById("consentBtn").onclick = ()=>{ state.consent=!state.consent; render(); };
    document.getElementById("startBtn").onclick = ()=>{ if(state.consent){ _tempoInicio = Date.now(); state.phase="q"; state.si=0; state.qi=0; render(); } };
    return;
  }

  if(state.phase==="q"){
    const {sec, q, qi, last} = curState();
    if(!q){ return; }
    const ans = isAnswered(q, state.answers);
    const needsBtn = (q.kind==="text" || q.kind==="select" || (q.kind==="choice" && state.answers[q.id]==="__outro__"));
    const showBtn = needsBtn || (state.reviewing[q.id] && ans);
    const defKey = sec.id+":"+qi;
    const defShown = sec.definicao ? ((defKey in state.defOpen) ? state.defOpen[defKey] : (qi===0 && state.si===0)) : false;
    app.innerHTML = ''
    + '<div class="header-row">'+ stepperHTML(state.si) +'<span class="save-chip" id="saveChip">'+chipInner(state.saving)+'</span></div>'
    + '<div class="sec-row"><p class="sec-name"><span class="sec-glyph">'+SECTION_GLYPH[state.si](14)+'</span>'+sec.eyebrow+' · '+sec.title+(sec.definicao?' <button class="def-btn" id="defBtn" aria-label="O que isto significa">'+ICON.info(15)+'</button>':'')+'</p><span class="sec-count">'+(last?"Última seção — quase lá":("Seção "+(state.si+1)+" de 4"))+'</span></div>'
    + '<div class="progress"><div class="progress-track"><div class="progress-fill" style="width:'+sectionProgress(sec,state.answers)+'%"></div></div></div>'
    + (defShown ? '<div class="def-panel">'+sec.definicao+'</div>' : '')
    + '<div class="card anim-card" id="qcard"><h2 class="q-title">'+esc(q.text)+'</h2><div class="q-body">'+questionFieldHTML(q,state.answers)+'</div></div>'
    + '<div class="nav-row"><button class="btn-ghost" id="backBtn">'+ICON.left(16)+' Voltar</button>'
    + (showBtn ? '<button class="btn-primary btn-inline" id="nextBtn" '+(ans?'':'disabled')+'>Avançar '+ICON.right(16)+'</button>' : '<span class="hint">Toque na sua resposta para avançar</span>')
    + '</div>';

    // listeners
    app.querySelectorAll("[data-val]").forEach(b=> b.onclick = ()=> selectAndAdvance(q.id, Number(b.getAttribute("data-val")), true) );
    const db=document.getElementById("defBtn"); if(db) db.onclick=()=>{ state.defOpen[defKey]=!defShown; render(); };
    app.querySelectorAll("[data-opt]").forEach(b=> b.onclick = ()=>{ const opt=b.getAttribute("data-opt"); selectAndAdvance(q.id, opt, opt!=="__outro__"); });
    const sel = document.getElementById("selectInput");
    if(sel) sel.onchange = (e)=> setAnswerFull(q.id, e.target.value);
    const other = document.getElementById("otherInput");
    if(other) other.oninput = (e)=>{ state.answers[q.id+"_outro"]=e.target.value; updateNext(q); flashSaveDirect(); };
    const txt = document.getElementById("textInput");
    if(txt) txt.oninput = (e)=>{ state.answers[q.id]=e.target.value; updateNext(q); flashSaveDirect(); };
    document.getElementById("backBtn").onclick = goBack;
    const nb=document.getElementById("nextBtn"); if(nb) nb.onclick = ()=>{ if(isAnswered(q,state.answers)) goNext(); };
    return;
  }

  if(state.phase==="transition"){
    var nextSec = SECTIONS[state.si+1];
    var nextDef = nextSec && nextSec.definicao ? nextSec.definicao : '';
    app.innerHTML = ''
    + '<div class="header-row">'+ stepperHTML(state.si) +'<span class="save-chip" id="saveChip">'+chipInner(false)+'</span></div>'
    + '<div class="sec-row"><p class="sec-name"><span class="sec-glyph">'+SECTION_GLYPH[state.si](14)+'</span>'+SECTIONS[state.si].eyebrow+' · '+SECTIONS[state.si].title+'</p><span class="sec-count">Seção '+(state.si+1)+' de 4</span></div>'
    + '<div class="card pad-lg center anim-card">'
    +   '<div class="frieze" style="margin:0 0 .25rem"></div>'
    +   '<div class="trans-diamond anim-tick">'+ICON.diamond(36)+'</div>'
    +   '<p class="trans-eyebrow">Seção '+(state.si+1)+' de 4 concluída</p>'
    +   '<h1 class="trans-title">'+NEXT_LEAD[state.si]+'</h1>'
    +   '<p class="trans-sub">Você concluiu esta etapa. Agora começará a próxima seção.</p>'
    +   (nextDef ? '<div class="trans-def">'+nextDef+'</div>' : '')
    +   '<div class="nav-center"><button class="btn-cont" id="contBtn">Continuar '+ICON.arrowR(16)+'</button></div>'
    +   '<button class="btn-back-sec" id="backBtn">'+ICON.left(15)+' Voltar para a seção anterior</button>'
    + '</div>';
    document.getElementById("backBtn").onclick = goBack;
    document.getElementById("contBtn").onclick = continueNext;
    return;
  }

  if(state.phase==="done"){
    app.innerHTML = ''
    + '<div class="card done-card anim-card">'
    +   '<div style="padding:clamp(.75rem,2vw,1.25rem) clamp(1.25rem,4vw,2.5rem) 0"><div class="frieze"></div></div>'
    +   '<div class="done-body">'

    +     '<div class="done-diamond-wrap anim-tick"><span class="done-diamond-line"></span><span class="done-diamond">'+ICON.diamond(32)+'</span><span class="done-diamond-line"></span></div>'
    +     '<p class="done-eyebrow">Pesquisa concluída</p>'
    +     '<h1 class="done-title">Respostas registradas</h1>'
    +     '<p class="done-sub">Obrigado pela colaboração. Suas respostas foram salvas e serão analisadas de forma agregada, <b>sem identificação individual</b>.</p>'

    +     '<div class="done-shortline"></div>'

    +     '<div class="email-box">'
    +       '<div class="email-header"><span class="ico-wrap">'+ICON.mail(18)+'</span><div><b>Receber resultados </b><span class="opt-tag">(opcional)</span></div></div>'
    +       '<p class="email-desc">Informe seu e-mail caso deseje receber um resumo dos resultados da pesquisa.</p>'
    +       '<div class="email-row"><input class="text-input sm" id="emailInput" inputmode="email" placeholder="seu@email.com (opcional)"><button class="btn-email" id="regBtn">Receber resultados</button></div>'
    +     '</div>'

    +     '<div class="done-divider"><span class="done-divider-line"></span><span class="done-divider-text">ou</span><span class="done-divider-line"></span></div>'

    +     '<button class="done-close" id="closeBtn"><span class="ico">'+ICON.left(18)+'</span><div><b>Encerrar pesquisa</b><span>Você pode fechar esta página com segurança.</span></div></button>'

    +     '<div class="done-footer">'
    +       '<img class="done-emblem" src="'+LOGO_DARK+'" alt="PPGAD">'
    +       '<div class="done-foot-line">Pesquisa de Mestrado</div>'
    +       '<div class="done-foot-inst">PPGAD · Universidade Federal do Pará</div>'
    +     '</div>'

    +   '</div>'
    + '</div>';
    document.getElementById("regBtn").onclick = (e)=>{
      const input = document.getElementById("emailInput");
      const email = (input.value || "").trim();
      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        input.focus(); input.style.borderColor = "#c0392b"; return;
      }
      e.target.textContent = "Enviando...";
      e.target.disabled = true;
      enviarEmail(email).then(function(res){
        e.target.textContent = res && res.ok ? "Registrado ✓" : "Tente novamente";
        if(!(res && res.ok)) e.target.disabled = false;
      });
    };
    document.getElementById("closeBtn").onclick = ()=>{};
    // Envia a submissão automaticamente ao chegar na tela done (idempotente).
    enviarSubmissaoFinal();
    return;
  }
}
function updateNext(q){
  const btn = document.getElementById("nextBtn");
  if(btn) btn.disabled = !isAnswered(q, state.answers);
}

render();
</script>
